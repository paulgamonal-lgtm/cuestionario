<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz: Resolución de Conflictos</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #111827;
    }

    .intro {
      margin-bottom: 20px;
    }

    .name-row {
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      max-width: 380px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }

    .question {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fafafa;
    }

    .question h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .option {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }

    button {
      margin-top: 18px;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .secondary {
      background: #047857;
      color: #fff;
      display: none;
      margin-left: 8px;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 10px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      display: none;
    }

    .warning {
      color: #b91c1c;
      margin-top: 8px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Quiz: Resolución de Conflictos</h1>
    <p class="intro">Responde las 15 preguntas y al final verás tu puntaje, nota final y podrás descargar un PDF con tu resultado y respuestas.</p>

    <form id="quizForm">
      <div class="name-row">
        <label for="studentName"><strong>Nombre del estudiante:</strong></label><br>
        <input id="studentName" name="studentName" type="text" placeholder="Escribe tu nombre completo" required>
      </div>

      <div id="questions"></div>

      <p id="warning" class="warning">Debes escribir tu nombre y responder todas las preguntas.</p>
      <button type="submit" class="primary">Calcular nota</button>
      <button type="button" id="downloadBtn" class="secondary">Descargar PDF</button>
    </form>

    <section id="result" class="result"></section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS5A2m4Q8nA+7jP5Qj8+Y0mXf55LO5j6JY6Q5N6j9SgPLVf8x7YQ2wD4Fb2fMblfC9ZwTe74oRUYw35vjA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    const quizData = [
      {
        text: "¿Qué es un conflicto?",
        options: [
          "Un tipo de juego",
          "Un lugar donde se juega",
          "Una situación en la que hay opiniones diferentes",
          "Una situación en la que todos están de acuerdo"
        ],
        answer: 2
      },
      {
        text: "¿Por qué pueden ser útiles los conflictos?",
        options: [
          "Ayudan a aprender a comunicarnos mejor",
          "Siempre son negativos",
          "No tienen importancia",
          "Solo causan problemas"
        ],
        answer: 0
      },
      {
        text: "¿Cuál es una razón por la que se producen conflictos?",
        options: [
          "Falta de comunicación",
          "Demasiada comunicación",
          "No hay emociones",
          "Siempre hay acuerdo"
        ],
        answer: 0
      },
      {
        text: "¿Qué significa resolver conflictos de manera inteligente?",
        options: [
          "Ignorar el problema",
          "Gritar y pelear",
          "Escuchar a los demás y buscar soluciones",
          "Actuar sin pensar"
        ],
        answer: 2
      },
      {
        text: "¿Cuál es el primer paso para resolver un conflicto?",
        options: [
          "Calmarse antes de actuar",
          "Gritar más fuerte",
          "Decidir quién tiene razón",
          "Irse del lugar"
        ],
        answer: 0
      },
      {
        text: "¿Qué se debe hacer al escuchar a la otra persona?",
        options: [
          "Gritarle",
          "Interrumpirla",
          "Permitir que explique lo que piensa",
          "No prestarle atención"
        ],
        answer: 2
      },
      {
        text: "¿Cómo se debe expresar lo que se siente?",
        options: [
          "Con insultos",
          "Gritando",
          "Con respeto",
          "Sin hablar"
        ],
        answer: 2
      },
      {
        text: "¿Qué se busca al resolver un conflicto?",
        options: [
          "Solo lo que le conviene a uno",
          "Hacer que el otro se sienta mal",
          "No buscar soluciones",
          "Soluciones que beneficien a todos"
        ],
        answer: 3
      },
      {
        text: "¿Qué se debe hacer si no se puede resolver un conflicto?",
        options: [
          "Decidir que no importa",
          "Gritar más",
          "Ignorar el problema",
          "Pedir ayuda cuando es necesario"
        ],
        answer: 3
      },
      {
        text: "¿Cuál es una consecuencia de resolver conflictos pacíficamente?",
        options: [
          "Mantener la amistad",
          "Aumentar la violencia",
          "Romper relaciones",
          "No tener amigos"
        ],
        answer: 0
      },
      {
        text: "¿Qué emociones pueden causar conflictos?",
        options: [
          "Enojo",
          "Sorpresa",
          "Felicidad",
          "Alegría"
        ],
        answer: 0
      },
      {
        text: "¿Qué se debe evitar al resolver un conflicto?",
        options: [
          "Escuchar",
          "Buscar soluciones",
          "Conversar",
          "Insultos o golpes"
        ],
        answer: 3
      },
      {
        text: "¿Qué se puede hacer si dos compañeros discuten por un balón?",
        options: [
          "No jugar más",
          "Ignorarse",
          "Pelear por él",
          "Decidir turnarse para usarlo"
        ],
        answer: 3
      },
      {
        text: "¿Qué se fortalece al aprender a resolver conflictos?",
        options: [
          "La convivencia democrática",
          "La indiferencia",
          "La falta de comunicación",
          "La soledad"
        ],
        answer: 0
      },
      {
        text: "¿Qué se debe hacer después de calmarse?",
        options: [
          "Decidir que no importa",
          "Irse",
          "Gritar más",
          "Escuchar a la otra persona"
        ],
        answer: 3
      }
    ];

    const questionsContainer = document.getElementById('questions');
    const quizForm = document.getElementById('quizForm');
    const resultEl = document.getElementById('result');
    const warningEl = document.getElementById('warning');
    const downloadBtn = document.getElementById('downloadBtn');

    let lastResult = null;

    function renderQuestions() {
      quizData.forEach((question, questionIndex) => {
        const wrapper = document.createElement('article');
        wrapper.className = 'question';

        const title = document.createElement('h3');
        title.textContent = `${questionIndex + 1}. ${question.text}`;
        wrapper.appendChild(title);

        question.options.forEach((option, optionIndex) => {
          const label = document.createElement('label');
          label.className = 'option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = `q${questionIndex}`;
          input.value = optionIndex;

          label.appendChild(input);
          label.append(` ${option}`);
          wrapper.appendChild(label);
        });

        questionsContainer.appendChild(wrapper);
      });
    }

    function getGrade(score) {
      if (score <= 7) {
        return 'C';
      }
      if (score <= 12) {
        return 'B';
      }
      return 'A';
    }

    function calculateResult() {
      const studentName = document.getElementById('studentName').value.trim();
      if (!studentName) {
        return null;
      }

      const answers = [];
      for (let i = 0; i < quizData.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) {
          return null;
        }
        answers.push(Number(selected.value));
      }

      let score = 0;
      answers.forEach((answer, index) => {
        if (answer === quizData[index].answer) {
          score++;
        }
      });

      const grade = getGrade(score);
      return { studentName, score, grade, answers };
    }

    function showResult(resultData) {
      const { studentName, score, grade } = resultData;
      resultEl.style.display = 'block';
      resultEl.innerHTML = `
        <h2>Resultado final</h2>
        <p><strong>Estudiante:</strong> ${studentName}</p>
        <p><strong>Puntaje:</strong> ${score} / ${quizData.length}</p>
        <p><strong>Nota final:</strong> ${grade}</p>
        <p>Escala: 0-7 = C, 8-12 = B, 13-15 = A.</p>
      `;

      downloadBtn.style.display = 'inline-block';
    }

    function downloadPdf(resultData) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      let y = 15;
      doc.setFontSize(16);
      doc.text('Reporte del Quiz: Resolución de Conflictos', 10, y);

      y += 10;
      doc.setFontSize(12);
      doc.text(`Nombre: ${resultData.studentName}`, 10, y);
      y += 8;
      doc.text(`Puntaje: ${resultData.score} / ${quizData.length}`, 10, y);
      y += 8;
      doc.text(`Nota final: ${resultData.grade}`, 10, y);
      y += 10;
      doc.text('Respuestas:', 10, y);

      y += 8;
      quizData.forEach((question, index) => {
        const selectedIndex = resultData.answers[index];
        const correctIndex = question.answer;
        const selectedText = question.options[selectedIndex];
        const isCorrect = selectedIndex === correctIndex;

        const line = `${index + 1}. ${isCorrect ? '✔' : '✘'} ${question.text}`;
        const answerLine = `   Tu respuesta: ${selectedText}`;

        const wrappedQuestion = doc.splitTextToSize(line, 180);
        const wrappedAnswer = doc.splitTextToSize(answerLine, 180);

        wrappedQuestion.forEach((part) => {
          if (y > 280) {
            doc.addPage();
            y = 15;
          }
          doc.text(part, 10, y);
          y += 6;
        });

        wrappedAnswer.forEach((part) => {
          if (y > 280) {
            doc.addPage();
            y = 15;
          }
          doc.text(part, 10, y);
          y += 6;
        });

        y += 2;
      });

      const safeName = resultData.studentName.replace(/\s+/g, '_');
      doc.save(`quiz_conflictos_${safeName}.pdf`);
    }

    quizForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const resultData = calculateResult();

      if (!resultData) {
        warningEl.style.display = 'block';
        return;
      }

      warningEl.style.display = 'none';
      lastResult = resultData;
      showResult(resultData);
    });

    downloadBtn.addEventListener('click', () => {
      if (lastResult) {
        downloadPdf(lastResult);
      }
    });

    renderQuestions();
  </script>
</body>
</html>
